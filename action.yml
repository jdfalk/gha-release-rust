name: 'Rust Release Build'
description: 'Build and test Rust crates for release'
author: 'jdfalk'

inputs:
  release-version:
    description: 'Release version tag'
    required: false
    default: ''
  protobuf-artifacts:
    description: 'Whether protobuf artifacts are available'
    required: false
    default: 'false'

runs:
  using: 'composite'
  steps:
    - name: Download protobuf artifacts
      if: inputs.protobuf-artifacts == 'true'
      uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
      with:
        name: protobuf-generated
        path: proto-generated

    - name: Build and test Rust
      uses: jdfalk/release-rust-action@802c77330bc57b1b97f123958131f40ccb2f4896 # v1.0.3
      with:
        rust-version: stable
        manifest-path: ./Cargo.toml
        crate-token: dummy-no-publish
        run-tests: 'true'
        run-clippy: 'true'
        check-format: 'true'
        dry-run: 'true'

    - name: Upload Rust artifacts
      if: always()
      uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
      with:
        name: rust-build
        path: target/release/*
        if-no-files-found: ignore
        retention-days: 14
